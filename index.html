<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4a2c1a">
<meta name="robots" content="noindex,nofollow">
<title>☕ コーヒーマイスター 一問一答</title>
<style>
  :root{
    --bg:#f6efe6; --card:#fffaf3; --ink:#2e221a; --sub:#7a6a5c;
    --brown:#6f4322; --brown2:#8a5a33; --accent:#c08433;
    --ok:#2f8f5b; --ng:#c0492f; --line:#e6d9c8; --shadow:0 6px 18px rgba(74,44,26,.10);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#221a14; --card:#2e241c; --ink:#f1e7da; --sub:#b6a48f;
      --brown:#c89a6a; --brown2:#d8b083; --accent:#e0a94e; --line:#42342a; --shadow:0 6px 18px rgba(0,0,0,.35); }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
    max-width:560px; margin:0 auto; padding:0 16px 40px;
    -webkit-font-smoothing:antialiased;
  }
  header{position:sticky; top:0; background:linear-gradient(var(--bg) 70%, transparent); padding:14px 0 8px; z-index:10}
  .brand{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .brand h1{font-size:18px; margin:0; color:var(--brown)}
  .pills{display:flex; gap:6px; font-size:12px}
  .pill{background:var(--card); border:1px solid var(--line); border-radius:999px; padding:3px 9px; color:var(--sub)}
  .pill b{color:var(--accent)}
  .screen{display:none; animation:fade .25s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}

  .btn{display:block; width:100%; border:none; border-radius:14px; padding:16px; font-size:16px;
    font-weight:700; cursor:pointer; box-shadow:var(--shadow); margin:10px 0}
  .btn-primary{background:var(--brown); color:#fff}
  .btn-sub{background:var(--card); color:var(--ink); border:1px solid var(--line); box-shadow:none; font-weight:600}
  .btn:active{transform:scale(.99)}
  .btn-row{display:flex; gap:10px}
  .btn-row .btn{margin:6px 0}

  .hero{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:var(--shadow); margin:12px 0}
  .hero .big{font-size:13px; color:var(--sub)}
  .hero .num{font-size:34px; font-weight:800; color:var(--brown)}
  .meta{font-size:13px; color:var(--sub); margin-top:2px}

  .sec-title{font-size:13px; color:var(--sub); margin:18px 4px 6px; font-weight:700; letter-spacing:.04em}
  .barwrap{margin:9px 0}
  .barlabel{display:flex; justify-content:space-between; font-size:13px; margin-bottom:3px}
  .barlabel span:last-child{color:var(--sub)}
  .bar{height:9px; background:var(--line); border-radius:999px; overflow:hidden}
  .bar > i{display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--brown2)); border-radius:999px; transition:width .4s}

  /* session */
  .qcount{font-size:13px; color:var(--sub); text-align:center; margin:8px 0}
  .progline{height:5px; background:var(--line); border-radius:999px; overflow:hidden; margin-bottom:14px}
  .progline > i{display:block; height:100%; background:var(--accent); transition:width .3s}
  .qcard{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px 18px; box-shadow:var(--shadow); min-height:160px; display:flex; flex-direction:column; justify-content:center}
  .chchip{align-self:flex-start; font-size:11px; color:#fff; background:var(--brown2); border-radius:999px; padding:2px 10px; margin-bottom:12px}
  .qtext{font-size:19px; font-weight:700; line-height:1.55}
  .answer{margin-top:16px; padding-top:16px; border-top:1px dashed var(--line); display:none}
  .answer.show{display:block; animation:fade .2s}
  .answer .alabel{font-size:12px; color:var(--sub)}
  .answer .atext{font-size:20px; font-weight:800; color:var(--brown); margin:4px 0 8px}
  .answer .ex{font-size:14px; color:var(--sub)}
  .grade{display:flex; gap:10px; margin-top:14px}
  .grade .btn{margin:0}
  .btn-ng{background:var(--ng); color:#fff}
  .btn-ok{background:var(--ok); color:#fff}
  .hint{text-align:center; font-size:12px; color:var(--sub); margin-top:10px}

  /* result */
  .result-emoji{font-size:48px; text-align:center; margin:10px}
  .stat-row{display:flex; gap:10px; margin:14px 0}
  .stat{flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; text-align:center}
  .stat .n{font-size:26px; font-weight:800}
  .stat .l{font-size:12px; color:var(--sub)}

  /* chapter list */
  .chrow{display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 14px; margin:8px 0; cursor:pointer}
  .chrow:active{transform:scale(.99)}
  .chrow .cn{width:30px; height:30px; flex:none; background:var(--brown); color:#fff; border-radius:9px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px}
  .chrow .ct{flex:1}
  .chrow .ct .t{font-weight:700; font-size:15px}
  .chrow .ct .s{font-size:12px; color:var(--sub)}
  .chrow .cg{font-size:12px; color:var(--sub); text-align:right}
  .ordtgl{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--sub); margin:4px 0 10px}
  .ordtgl button{border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:999px; padding:6px 14px; font-size:13px; font-weight:600}
  .ordtgl button.on{background:var(--brown); color:#fff; border-color:var(--brown)}

  /* settings */
  .field{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin:10px 0}
  .field label{font-weight:700; font-size:14px; display:block; margin-bottom:8px}
  .stepper{display:flex; align-items:center; gap:14px}
  .stepper button{width:42px; height:42px; border-radius:11px; border:1px solid var(--line); background:var(--bg); font-size:22px; font-weight:700; color:var(--brown)}
  .stepper .val{font-size:22px; font-weight:800; min-width:46px; text-align:center}
  .danger{color:var(--ng); font-weight:700; font-size:14px; background:none; border:none; padding:8px 0; cursor:pointer}
  .topnav{display:flex; align-items:center; gap:10px; margin:6px 0 4px}
  .back{background:none; border:none; color:var(--brown); font-size:15px; font-weight:700; cursor:pointer; padding:6px 0}
  .empty{text-align:center; color:var(--sub); padding:30px 10px}
  footer{text-align:center; color:var(--sub); font-size:11px; margin-top:26px}
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>☕ コーヒーマイスター</h1>
    <div class="pills">
      <span class="pill">🔥 連続 <b id="p-streak">0</b>日</span>
      <span class="pill">今日 <b id="p-today">0</b></span>
    </div>
  </div>
</header>

<!-- HOME -->
<section id="home" class="screen active">
  <div class="hero">
    <div class="big">本日の演習</div>
    <div class="num"><span id="due-count">0</span> <span style="font-size:16px;color:var(--sub)">問</span></div>
    <div class="meta" id="due-meta">復習 0 ・ 新規 0</div>
  </div>
  <button class="btn btn-primary" onclick="startDaily()">▶ 今日の演習を始める</button>
  <div class="btn-row">
    <button class="btn btn-sub" onclick="show('chapters')">📚 章別演習</button>
    <button class="btn btn-sub" onclick="startWeak()">🩹 弱点だけ復習</button>
  </div>

  <div class="sec-title">学習の進捗</div>
  <div class="hero" style="margin-top:6px">
    <div class="barlabel"><span><b id="mastered-n">0</b> / <span id="total-n">0</span> 問 マスター</span><span id="mastered-pct">0%</span></div>
    <div class="bar"><i id="mastered-bar" style="width:0%"></i></div>
  </div>
  <div id="chapter-bars"></div>

  <button class="btn btn-sub" style="margin-top:18px" onclick="show('settings')">⚙️ 設定</button>
  <footer id="foot"></footer>
</section>

<!-- SESSION -->
<section id="session" class="screen">
  <div class="topnav"><button class="back" onclick="quitSession()">← やめる</button><span id="sess-mode" style="color:var(--sub);font-size:13px"></span></div>
  <div class="qcount"><span id="q-i">1</span> / <span id="q-n">10</span></div>
  <div class="progline"><i id="q-prog" style="width:0%"></i></div>
  <div class="qcard">
    <span class="chchip" id="q-ch">第1章</span>
    <div class="qtext" id="q-text">―</div>
    <div class="answer" id="q-ans">
      <div class="alabel">こたえ</div>
      <div class="atext" id="q-a">―</div>
      <div class="ex" id="q-ex"></div>
    </div>
  </div>
  <button class="btn btn-primary" id="reveal-btn" onclick="reveal()">答えを見る</button>
  <div class="grade" id="grade" style="display:none">
    <button class="btn btn-ng" onclick="grade(false)">✕ まだ</button>
    <button class="btn btn-ok" onclick="grade(true)">○ 覚えた</button>
  </div>
  <div class="hint" id="kbd-hint"></div>
</section>

<!-- RESULT -->
<section id="result" class="screen">
  <div class="result-emoji" id="r-emoji">🎉</div>
  <div style="text-align:center;font-size:18px;font-weight:800" id="r-title">おつかれさまでした</div>
  <div class="stat-row">
    <div class="stat"><div class="n" id="r-total">0</div><div class="l">演習</div></div>
    <div class="stat"><div class="n" style="color:var(--ok)" id="r-ok">0</div><div class="l">○ 覚えた</div></div>
    <div class="stat"><div class="n" style="color:var(--ng)" id="r-ng">0</div><div class="l">✕ まだ</div></div>
  </div>
  <div class="meta" id="r-msg" style="text-align:center;margin:10px"></div>
  <button class="btn btn-primary" onclick="show('home');refreshHome()">ホームへ戻る</button>
  <button class="btn btn-sub" id="r-again" onclick="startDaily()" style="display:none">続けてもう一度</button>
</section>

<!-- CHAPTERS -->
<section id="chapters" class="screen">
  <div class="topnav"><button class="back" onclick="show('home')">← ホーム</button></div>
  <div class="sec-title">章を選んで演習</div>
  <div class="ordtgl">出題順：
    <button id="ord-seq" class="on" onclick="setChOrder('seq')">順番どおり</button>
    <button id="ord-rand" onclick="setChOrder('rand')">ランダム</button>
  </div>
  <button class="btn btn-sub" style="margin:0 0 10px" onclick="startAllSequential()">▶ 全章を順番に通し（全<span id="all-count">—</span>問）</button>
  <div id="ch-list"></div>
</section>

<!-- SETTINGS -->
<section id="settings" class="screen">
  <div class="topnav"><button class="back" onclick="show('home');refreshHome()">← ホーム</button></div>
  <div class="sec-title">設定</div>
  <div class="field">
    <label>1日の出題数</label>
    <div class="stepper">
      <button onclick="changeLimit(-5)">−</button>
      <div class="val" id="limit-val">10</div>
      <button onclick="changeLimit(5)">＋</button>
      <span style="color:var(--sub);font-size:13px">問</span>
    </div>
  </div>
  <div class="field">
    <label>データ</label>
    <div style="font-size:13px;color:var(--sub);margin-bottom:6px">進捗はこの端末のブラウザに保存されます。</div>
    <button class="danger" onclick="resetAll()">⚠️ 進捗をすべてリセット</button>
  </div>
  <div class="field">
    <label>収録状況</label>
    <div id="bank-info" style="font-size:13px;color:var(--sub)"></div>
  </div>
</section>

<script>
/* ============== 問題バンク ==============
   ch: 章番号, q: 問題, a: 答え, ex: 補足(任意)
   ※第1・2章の初版。第3〜7章は順次追加予定。 */
const CH_NAMES = {
  1:"コーヒーマイスター", 2:"コーヒーとカフェの歴史", 3:"コーヒーの生豆",
  4:"コーヒーの産業・経済", 5:"コーヒーの産地", 6:"コーヒーの抽出技術と食器", 7:"コーヒーの科学と健康"
};
const QUESTIONS = [
  // ---------- 第1章 ----------
  {ch:1,q:"コーヒーマイスターとは、ひとことで言えば何のプロフェッショナルか？",a:"コーヒーの飲用者（消費者）に、おいしさや楽しさを伝えるプロ",ex:"消費者（コーヒーを飲む人）の一番近くに存在するコーヒーマン。"},
  {ch:1,q:"コーヒーマイスター認定制度が確立された年と、確立した団体は？",a:"1999年、日本スペシャリティーコーヒー協会（現SCAJの前身）"},
  {ch:1,q:"「SCAJ」の正式名称を日本語と英語で？",a:"日本スペシャルティコーヒー協会／Specialty Coffee Association of Japan"},
  {ch:1,q:"SCAJは何年に、どんな法人形態でスタートし、現在は何法人か？",a:"2003年に有限責任中間法人としてスタート、2009年より一般社団法人"},
  {ch:1,q:"日本のコーヒー市場の大きな三つの分野は？",a:"工業用・業務用・家庭用"},
  {ch:1,q:"缶コーヒー用の原料は、三分野のうちどれに属するか？",a:"工業用"},
  {ch:1,q:"ホテルなどで使われるレギュラーコーヒーは、三分野のうちどれか？",a:"業務用"},
  {ch:1,q:"SCAJのスペシャルティコーヒーの定義における「消費者」とは？",a:"コーヒーを飲む人"},
  {ch:1,q:"スペシャルティコーヒーの定義を一言で言うと？",a:"消費者が美味しいと評価して満足するコーヒー",ex:"風味の素晴らしさ＝カップ・クォリティで判定する。"},
  {ch:1,q:"「コーヒーの栽培からカップに至るまでの長い道のり」を表す英語の言葉は？",a:"フロム・シード・トゥ・カップ（From seed to cup）"},
  {ch:1,q:"風味の素晴らしさの三本柱「持続するコーヒー感」「際立つ印象的な風味特性」とあと一つは？",a:"素晴らしい酸味特性（酸味）"},
  {ch:1,q:"一般（メインストリーム）コーヒーの品質判定は、主に何チェックを対象とするか？",a:"欠点チェック"},
  {ch:1,q:"SCAJのカッピングフォームは何点満点か？",a:"100点満点"},
  {ch:1,q:"SCAJカッピングの評価項目はいくつあり、各項目は何点満点か？",a:"8項目・各8点"},
  {ch:1,q:"カッピングで「明るさ・爽やかさ（酸の質）」を評価する項目は？",a:"酸味（酸味の特徴評価）",ex:"酸度の強さではなく“酸の質”を評価する。"},
  {ch:1,q:"カッピングで「粘り気・密度・濃さ・舌触り」を評価する項目は？",a:"口に含んだ質感"},
  {ch:1,q:"カッピングで「飲み込んだ後に持続する風味」を評価する項目は？",a:"後味の印象度"},
  {ch:1,q:"スペシャルティコーヒーで重要視される、生産国から消費国に至る2つの観念は？",a:"サステイナビリティ（持続可能性）とトレーサビリティ（追跡可能性）"},
  // ---------- 第2章 ----------
  {ch:2,q:"15世紀半ば、歴史の舞台にコーヒーが登場した、インド洋に面した都市は？",a:"アデン"},
  {ch:2,q:"コーヒーの商業的栽培を最初に始めた地域が属する国は？",a:"イエメン"},
  {ch:2,q:"紅海に面した、当時のコーヒー輸出港は？",a:"モカ"},
  {ch:2,q:"コーヒーノキの原産地とされる国は？",a:"エチオピア"},
  {ch:2,q:"1517年マムルーク朝を滅ぼし、カイロからコンスタンティノープルにコーヒーを持ち帰ったオスマン・トルコのスルタンは？",a:"セリム1世"},
  {ch:2,q:"1554年にコンスタンティノープルに伝わったカフェを、トルコで何と呼ぶか？",a:"カフェ・ハネ"},
  {ch:2,q:"イスラム圏でコーヒーへの迫害・論争が起きた、3つの主な論点は？",a:"宗教的問題・政治（社会的）問題・健康問題"},
  {ch:2,q:"『コーヒーの合法性の擁護』の著者は？",a:"ジャズィーリー（またはアブダル・カディール）"},
  {ch:2,q:"ヨーロッパで最初にコーヒーに関する本を著述した学者は？",a:"ラウヴォルフ"},
  {ch:2,q:"ヨーロッパで最も早くコーヒー貿易を手がけた国は？",a:"オランダ"},
  {ch:2,q:"1715年にフランスがコーヒー移植に成功したレユニオン島の、当時の旧名は？",a:"ブルボン島"},
  {ch:2,q:"オランダがアムステルダム植物園のコーヒーの苗木を献呈したフランス国王は？",a:"ルイ14世"},
  {ch:2,q:"1723年、苦難の末に西インド諸島へコーヒーの苗木をもたらした人物は？",a:"（ガブリエル・）ド・クリュー"},
  {ch:2,q:"ド・クリューが最初にコーヒーを移植した島は？",a:"マルチニーク島"},
  {ch:2,q:"18世紀後半に世界最大のコーヒー生産地となったフランス植民地は？",a:"ハイチ"},
  {ch:2,q:"ブラジルのパラに初めてコーヒーを移植した年と人物は？",a:"1727年、パリェタ"},
  {ch:2,q:"ヨーロッパで最も早くカフェが社会に定着した国と、その中心都市は？",a:"イギリス、ロンドン"},
  {ch:2,q:"現存する大保険組合（ロイズ）発祥となったカフェは？",a:"ロイズ・コーヒーハウス"},
  {ch:2,q:"1686年開業、以降のパリのカフェの原型といわれるカフェは？",a:"カフェ・プロコプ"},
  {ch:2,q:"フランス革命の端緒、バスティーユ牢獄襲撃の出発点となったカフェは？",a:"カフェ・ド・フォワ"},
  {ch:2,q:"1720年ヴェネツィアに開業した、現存するイタリア最古のカフェは？",a:"カフェ・フローリアン"},
  {ch:2,q:"1760年開業、多くの芸術家が訪れたローマのカフェは？",a:"カフェ・グレコ"},
  {ch:2,q:"1683年ウィーン攻囲で英雄となり、褒賞の生豆でカフェを始めたとされる人物は？",a:"コルシツキー"},
  {ch:2,q:"プロイセンのフリードリヒ大王のコーヒー禁止令により広まった、コーヒーの代用品は？",a:"チコリ"},
  {ch:2,q:"コーヒーがアメリカの国民飲料になるきっかけとなった、1773年の事件は？",a:"ボストン茶会事件"},
  {ch:2,q:"1888年、リオデジャネイロのコーヒー生産に壊滅的打撃を与えた法令は？",a:"奴隷制廃止令"},
  {ch:2,q:"1800年頃フランスで開発された、発明者の名にちなむ抽出器具は？",a:"ド・ベロワのコーヒー（ドリップ）・ポット"},
  {ch:2,q:"1901年にエスプレッソ・マシンを開発した人物は？",a:"ベッツェラ（ベゼラ）"},
  {ch:2,q:"1888年、上野・黒門町に開業した日本の喫茶店の先駆けの店名は？",a:"可否茶館"},
  {ch:2,q:"1911年、サンパウロ州政府の援助を得て銀座に開業した、後の喫茶店の原型となった店は？",a:"カフェ・パウリスタ"},
  {ch:2,q:"1970年代、コーヒーに商品を特化して全国に広まった喫茶店の業態を何と呼ぶか？",a:"コーヒー専門店"},
  // ---------- 第3章 ----------
  {ch:3,q:"一般に「コーヒー豆」と呼ばれるのは、コーヒーの実のどの部分か？",a:"種子（生豆）",ex:"コーヒーチェリーの中の種子が生豆。"},

/* ============== 状態管理 ============== */
const KEY="cm_quiz_state_v1";
const IV=[0,1,2,4,8,16,30]; // box番号→次回までの日数
const MASTER_BOX=5;
function today(){const n=new Date();return Math.floor((n.getTime()-n.getTimezoneOffset()*60000)/86400000);}
function load(){
  let s;try{s=JSON.parse(localStorage.getItem(KEY));}catch(e){s=null;}
  if(!s||s.v!==1) s={v:1,limit:10,streak:0,lastDay:null,cards:{},log:{}};
  return s;
}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
let state=load();
QUESTIONS.forEach((q,i)=>q.id="q"+i); // 安定ID

/* ============== 画面遷移 ============== */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ============== セッション ============== */
let sess=null; // {queue:[ids], i, ok, ng, mode}
function dueCards(){return QUESTIONS.filter(q=>state.cards[q.id]&&state.cards[q.id].due<=today());}
function newCards(){return QUESTIONS.filter(q=>!state.cards[q.id]);}

function buildDaily(){
  const due=dueCards().sort((a,b)=>state.cards[a.id].due-state.cards[b.id].due);
  const fresh=newCards();
  const limit=state.limit;
  let queue=due.slice(0,limit);
  if(queue.length<limit) queue=queue.concat(fresh.slice(0,limit-queue.length));
  return queue.map(q=>q.id);
}
function startDaily(){
  const queue=buildDaily();
  if(queue.length===0){ show('result'); showEmptyResult(); return; }
  sess={queue,i:0,ok:0,ng:0,mode:'今日の演習'};
  renderQ();
}
function startWeak(){
  const weak=QUESTIONS.filter(q=>state.cards[q.id]&&state.cards[q.id].box<=2);
  if(weak.length===0){ alert('弱点はありません。まず演習で×を付けた問題がここに集まります。'); return; }
  shuffle(weak);
  sess={queue:weak.map(q=>q.id),i:0,ok:0,ng:0,mode:'弱点復習'};
  renderQ();
}
let chOrder='seq';
function setChOrder(o){ chOrder=o;
  document.getElementById('ord-seq').classList.toggle('on',o==='seq');
  document.getElementById('ord-rand').classList.toggle('on',o==='rand');
}
function startChapter(ch){
  const pool=QUESTIONS.filter(q=>q.ch===ch);
  if(chOrder==='rand') shuffle(pool);
  sess={queue:pool.map(q=>q.id),i:0,ok:0,ng:0,mode:'第'+ch+'章'+(chOrder==='rand'?'（ランダム）':'（順番）')};
  renderQ();
}
function startAllSequential(){
  const pool=QUESTIONS.slice(); // 第1章→第7章の収録順
  sess={queue:pool.map(q=>q.id),i:0,ok:0,ng:0,mode:'全章 通し（順番）'};
  renderQ();
}
function renderQ(){
  show('session');
  const id=sess.queue[sess.i];
  const q=QUESTIONS.find(x=>x.id===id);
  document.getElementById('sess-mode').textContent=sess.mode;
  document.getElementById('q-i').textContent=sess.i+1;
  document.getElementById('q-n').textContent=sess.queue.length;
  document.getElementById('q-prog').style.width=(sess.i/sess.queue.length*100)+'%';
  document.getElementById('q-ch').textContent='第'+q.ch+'章 '+CH_NAMES[q.ch];
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-a').textContent=q.a;
  document.getElementById('q-ex').textContent=q.ex||'';
  document.getElementById('q-ex').style.display=q.ex?'block':'none';
  document.getElementById('q-ans').classList.remove('show');
  document.getElementById('reveal-btn').style.display='block';
  document.getElementById('grade').style.display='none';
  document.getElementById('kbd-hint').textContent = isDesktop()?'スペース=答え／1=✕／2=○':'';
}
function reveal(){
  document.getElementById('q-ans').classList.add('show');
  document.getElementById('reveal-btn').style.display='none';
  document.getElementById('grade').style.display='flex';
}
function grade(ok){
  const id=sess.queue[sess.i];
  let c=state.cards[id]||{box:0,due:today()};
  if(ok){ c.box=Math.min(c.box+1,6); c.due=today()+IV[c.box]; sess.ok++; }
  else  { c.box=1; c.due=today()+1; sess.ng++; }
  state.cards[id]=c;
  save();
  sess.i++;
  if(sess.i>=sess.queue.length){ finishSession(); }
  else renderQ();
}
function finishSession(){
  const d=today();
  if(!state.log[d]) state.log[d]={studied:0,ok:0,ng:0};
  state.log[d].studied+=sess.queue.length; state.log[d].ok+=sess.ok; state.log[d].ng+=sess.ng;
  // 連続日数
  if(state.lastDay!==d){
    if(state.lastDay===d-1) state.streak++; else state.streak=1;
    state.lastDay=d;
  }
  save();
  // 結果画面
  document.getElementById('r-total').textContent=sess.queue.length;
  document.getElementById('r-ok').textContent=sess.ok;
  document.getElementById('r-ng').textContent=sess.ng;
  const rate=sess.ok/sess.queue.length;
  document.getElementById('r-emoji').textContent= rate>=0.9?'🏆': rate>=0.6?'🎉':'💪';
  document.getElementById('r-title').textContent= rate>=0.9?'素晴らしい！':'おつかれさまでした';
  document.getElementById('r-msg').textContent= sess.ng>0? '✕の'+sess.ng+'問は「弱点だけ復習」と翌日以降の演習で自動的に出てきます。':'全問○！この調子です。';
  const more=dueCards().length>0||newCards().length>0;
  document.getElementById('r-again').style.display= (sess.mode==='今日の演習'&&more)?'block':'none';
  show('result');
}
function showEmptyResult(){
  document.getElementById('r-emoji').textContent='✅';
  document.getElementById('r-title').textContent='今日のノルマ完了！';
  document.getElementById('r-total').textContent='0';
  document.getElementById('r-ok').textContent='0';
  document.getElementById('r-ng').textContent='0';
  document.getElementById('r-msg').textContent='今日復習すべき問題はありません。明日また続けましょう。章別演習で先取りもできます。';
  document.getElementById('r-again').style.display='none';
}
function quitSession(){ if(confirm('演習を中断しますか？（ここまでの記録は保存済み）')){ show('home'); refreshHome(); } }

/* ============== ホーム更新 ============== */
function refreshHome(){
  state=load();
  const due=dueCards().length, fresh=newCards().length;
  const limit=state.limit;
  let plan=Math.min(due,limit); if(plan<limit) plan+=Math.min(fresh,limit-plan);
  document.getElementById('due-count').textContent=plan;
  document.getElementById('due-meta').textContent='復習 '+Math.min(due,limit)+' ・ 新規 '+Math.max(0,plan-Math.min(due,limit));
  document.getElementById('p-streak').textContent=state.streak;
  const d=today();
  document.getElementById('p-today').textContent=(state.log[d]?state.log[d].studied:0);
  // 全体マスター
  const total=QUESTIONS.length;
  const mastered=QUESTIONS.filter(q=>state.cards[q.id]&&state.cards[q.id].box>=MASTER_BOX).length;
  document.getElementById('mastered-n').textContent=mastered;
  document.getElementById('total-n').textContent=total;
  const pct=total?Math.round(mastered/total*100):0;
  document.getElementById('mastered-pct').textContent=pct+'%';
  document.getElementById('mastered-bar').style.width=pct+'%';
  // 章別バー
  const wrap=document.getElementById('chapter-bars'); wrap.innerHTML='';
  Object.keys(CH_NAMES).forEach(ch=>{
    const qs=QUESTIONS.filter(q=>q.ch==ch); if(!qs.length) return;
    const m=qs.filter(q=>state.cards[q.id]&&state.cards[q.id].box>=MASTER_BOX).length;
    const p=Math.round(m/qs.length*100);
    const el=document.createElement('div'); el.className='barwrap';
    el.innerHTML='<div class="barlabel"><span>第'+ch+'章 '+CH_NAMES[ch]+'</span><span>'+m+'/'+qs.length+'</span></div><div class="bar"><i style="width:'+p+'%"></i></div>';
    wrap.appendChild(el);
  });
  const covered=[...new Set(QUESTIONS.map(q=>q.ch))].sort((a,b)=>a-b);
  const remain=Object.keys(CH_NAMES).map(Number).filter(c=>!covered.includes(c));
  document.getElementById('foot').textContent='収録 '+total+'問（第'+covered.join('・')+'章）'+(remain.length?'｜第'+remain.join('・')+'章を順次追加予定':'｜全7章収録');
}

/* ============== 章別画面 ============== */
function renderChapters(){
  const ac=document.getElementById('all-count'); if(ac) ac.textContent=QUESTIONS.length;
  document.getElementById('ord-seq').classList.toggle('on',chOrder==='seq');
  document.getElementById('ord-rand').classList.toggle('on',chOrder==='rand');
  const list=document.getElementById('ch-list'); list.innerHTML='';
  Object.keys(CH_NAMES).forEach(ch=>{
    const qs=QUESTIONS.filter(q=>q.ch==ch);
    const m=qs.filter(q=>state.cards[q.id]&&state.cards[q.id].box>=MASTER_BOX).length;
    const row=document.createElement('div'); row.className='chrow';
    const has=qs.length>0;
    row.innerHTML='<div class="cn">'+ch+'</div><div class="ct"><div class="t">'+CH_NAMES[ch]+'</div><div class="s">'+(has?qs.length+'問':'準備中（追加予定）')+'</div></div><div class="cg">'+(has?m+'/'+qs.length+' マスター':'—')+'</div>';
    if(has) row.onclick=()=>startChapter(parseInt(ch));
    else row.style.opacity=.5;
    list.appendChild(row);
  });
}

/* ============== 設定 ============== */
function changeLimit(d){ state.limit=Math.max(5,Math.min(50,state.limit+d)); document.getElementById('limit-val').textContent=state.limit; save(); }
function resetAll(){ if(confirm('進捗・連続日数・弱点記録をすべて消去します。よろしいですか？')){ localStorage.removeItem(KEY); state=load(); refreshHome(); show('home'); alert('リセットしました。'); } }

/* ============== util ============== */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }
function isDesktop(){ return !('ontouchstart' in window) && window.innerWidth>700; }
document.addEventListener('keydown',e=>{
  if(!document.getElementById('session').classList.contains('active')) return;
  const revealed=document.getElementById('q-ans').classList.contains('show');
  if((e.key===' '||e.key==='Enter')&&!revealed){ e.preventDefault(); reveal(); }
  else if(revealed&&(e.key==='1')){ grade(false); }
  else if(revealed&&(e.key==='2')){ grade(true); }
});

/* ============== init ============== */
function initSettings(){ document.getElementById('limit-val').textContent=state.limit;
  let bi='全'+QUESTIONS.length+'問 ／ ';
  Object.keys(CH_NAMES).forEach(c=>{const n=QUESTIONS.filter(q=>q.ch==c).length; if(n)bi+='第'+c+'章 '+n+'問・';});
  document.getElementById('bank-info').textContent=bi.replace(/・$/,'。'); }
// 画面を開くたびに再描画
const _show=show;
show=function(id){ _show(id); if(id==='home')refreshHome(); if(id==='chapters')renderChapters(); if(id==='settings')initSettings(); };
refreshHome();
</script>
